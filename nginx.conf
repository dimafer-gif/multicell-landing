server {
    listen 80;
    server_name multicelllojas.com.br www.multicelllojas.com.br;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name multicelllojas.com.br www.multicelllojas.com.br;

    # SSL certs (Certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/multicelllojas.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/multicelllojas.com.br/privkey.pem;

    root /var/www/multicelllojas;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://mdogbzpspkojwidlrrrl.supabase.co;" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
}
